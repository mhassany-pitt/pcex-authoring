<!doctype html>
<html lang="en">
  <script>
    // by default the http://backend-server/preview/ path will be used
    // and this is only for previous production urls!
    const params = new URLSearchParams(location.search);
    const isDev = location.href.startsWith("http://localhost");
    const host = isDev ? "http://localhost:2000" : "https://acos.cs.vt.edu";
    const redirect = `${host}/html/acos-pcex/acos-pcex-examples/preview${params.size ? "?" + params.toString() : ""}`;
    location.href = redirect;
  </script>
</html>
