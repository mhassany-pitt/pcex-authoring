<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Program Construction Examples</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="font-awesome.min.css">
  <!-- Bootstrap core CSS -->
  <link href="bootstrap.min.css" rel="stylesheet">
  <link href="icon" rel="stylesheet">
  <link rel="stylesheet" href="materialize.min.css">
  <link rel="stylesheet" href="jquery.webui-popover.min.css">
  <link href="mdb.min.css" rel="stylesheet">
  <link href="jquery-ui.min.css" rel="stylesheet">
  <link href="vs.css" rel="stylesheet">

  <link href="style.css" rel="stylesheet">

  <style type="text/css">
    .hljs-ln {
      border-collapse: collapse
    }

    .hljs-ln td {
      padding: 0
    }

    .hljs-ln-n:before {
      content: attr(data-line-number)
    }
  </style>
</head>

<body>
  <header>
  </header>
  <main>
    <div class="container-fluid">
      <div id="goal-header" class="row">
        <!-- <div>
          <button id="back-button" type="button" class="pcex_button btn-sm btn-responsive"
            data-match-height="pcex_button" style="height: 101.156px;" disabled="disabled">
            <img class="img-fluid" src="ic_chevron_left_white_36pt_2x.png">Back
          </button>
        </div> -->
        <div id="goal_column" class="col-sm-6 col-md-8 col-lg-9 col-xl-10">
          <div class="card">
            <p id="goal_title" class="card-header primary-color white-text"><img src="reader-24_white.png"></p>
            <div class="card-block">
              <pre><p id="goal_description" class="card-text"></p></pre>
            </div>
          </div>
        </div>
        <!-- <div class="col-sm-1 col-md-1 col-lg-1 col-xl-1">
          <button id="next-button" type="button" class="pcex_button btn-sm btn-responsive btn-primary"
            data-match-height="pcex_button" style="height: 101.156px;">
            <img class="img-fluid" src="ic_navigate_next_white_36dp_2x.png">Challenge Me!
          </button>
        </div> -->

      </div>
      <div id="draggable" class="row">
        <div class="col-sm-8">
          <div class="card">
            <div id="div_code" class="panel-body"></div>
          </div>
        </div>
        <div id="scrollable" class="col-sm-4">
          <div id="scrollable-content">

            <a id="start-animation-button" class="waves-effect waves-light btn">Explain the program <img
                src="teacher_36.png"></a>

            <div id="checkCollapsible" class="panel-collapse collapse">
              <div class="card card-danger card-primary mb-3">
                <div id="check-result-block" class="card-block">
                  <h5 id="check-result-title"></h5>
                  <pre><p id="check-result-message"></p></pre>
                  <footer>
                    <a id="clear-button" class="btn btn-danger btn-sm">Clear</a>
                    <a id="shortcut-next-button" class="btn btn-primary btn-sm">Next Challenge</a>
                    <a id="show-correct-button" class="btn btn-success btn-sm" style="display: none;">Show Me Correct
                      Program</a>
                    <a id="show-hint-button" class="btn btn-warning btn-sm" style="display: none;">Show Me Hint</a>
                    <a id="show-message-details" class="btn btn-secondary btn-sm" style="display: none;">Tell me what’s
                      wrong</a>
                  </footer>
                </div>
              </div>
            </div>
            <div id="explanation-div" class="card" style="display: none;">
              <div id="explanation-title" class="card-header secondary-color white-text ">
                <span class="hidden-md-down">Explanations</span>
                <a id="animation-back-button" class="waves-effect waves-light btn btn-sm" style="display: none;"
                  disabled="true"><i class="material-icons left">undo</i>Previous</a>
                <a id="animation-next-button" class="waves-effect waves-light btn btn-sm" style="display: none;"><i
                    class="material-icons right">redo</i>Next</a>
              </div>
              <div id="explanation" class="card-block">
              </div>
            </div>
            <div id="hint-div" class="card" style="display: none;">
              <div class="card-header white-text hint-title">Hint
                <button id="close-hint-button" type="button" class="close" aria-label="Close">
                  <span aria-hidden="true">×</span>
                </button>
              </div>
              <div id="hint" class="card-block">
              </div>
            </div>
            <div id="drag-tile-div" class="card" style="display: none;">
              <div id="drag-tile-title" class="card-header secondary-color white-text">
                Drag a tile from here
                <a id="check-button" class="waves-effect waves-light btn btn-challenge" disabled="true"
                  data-toggle="collapse" data-target="#checkCollapsible" aria-expanded="false" style="display: none;">
                  <i class="material-icons right">play_circle_outline</i>
                  CHECK
                </a>
              </div>

              <div id="tiles" class="card-block">
                <div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div id="overlay"></div>

        <div id="result-modal" class="modal modal-fixed-footer" style="z-index: 1003;">
          <div class="modal-content">
            <div id="modal-check-result-title"></div>
            <div id="modal-check-result-div">
              <pre><hr><p id="modal-check-result-message"></p></pre>
            </div>
            <div id="modal-output-div" class="no-gutters">
              <hr>
              <div class="row vdivide">
                <div class="col-sm-6">
                  <div>
                    <p id="modal-current-output" class="modal-sub-title">Current Output</p>
                    <pre><p id="modal-current-output-message"></p></pre>
                  </div>
                </div>
                <div class="col-sm-6">
                  <div>
                    <p id="modal-expected-output" class="modal-sub-title">Expected Output</p>
                    <pre><p id="modal-expected-output-message"></p></pre>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <a class="modal-action modal-close waves-effect waves-light btn btn-danger">Close</a>
          </div>
        </div>

      </div>
    </div>
  </main>
  <footer>
  </footer>
  <!-- JQuery -->
  <script type="text/javascript" src="jquery-3.1.1.min.js"></script>
  <script type="text/javascript" src="jquery-ui.min.js"></script>

  <!-- Bootstrap tooltips -->
  <script type="text/javascript" src="tether.min.js"></script>
  <!-- Bootstrap core JavaScript -->
  <script type="text/javascript" src="bootstrap.min.js"></script>

  <script src="materialize.min.js"></script>
  <script src="jquery.webui-popover.min.js"></script>
  <script src="jquery.matchHeight.js" type="text/javascript"></script>
  <script src="highlight.pack-withlinenumbers.js" type="text/javascript"></script>
  <script src="highlight.pack.js" type="text/javascript"></script>
  <script src="highlightjs-line-numbers.js" type="text/javascript"></script>
  <script src="url.min.js" type="text/javascript"></script>
  <script src="js.cookie.js" type="text/javascript"></script>
  <script src="pcex.js" type="text/javascript"></script>

  <div class="hiddendiv common"></div>
</body>

</html>
