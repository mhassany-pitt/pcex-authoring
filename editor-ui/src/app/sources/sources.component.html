<div class="flex flex-col">
  <div class="px-10 py-4 bg-gray-100 shadow-md">
    <div class="container mx-auto flex items-center gap-4">
      <img src="./assets/logo.png" class="h-8 w-8" />
      <span class="text-xl font-bold">PCEX Authoring</span>
      <i class="pi pi-chevron-right -mx-2"></i>

      <div class="flex items-center -my-2">
        <button pButton type="button" [routerLink]="['/activities']" label="Activities"
          class="p-button-sm p-button-outlined"
          style="padding: 0.25rem 0.5rem; border-top-right-radius: 0; border-bottom-right-radius: 0; font-size: 1.25rem;"></button>
        <button pButton type=" button" [routerLink]="['/sources']" label="Sources" class="p-button-sm"
          style="padding: 0.25rem 0.5rem; border-top-left-radius: 0; border-bottom-left-radius: 0; font-size: 1.25rem;"></button>
      </div>

      <span class=" flex-grow"></span>

      <app-user-auth-ctrl></app-user-auth-ctrl>
    </div>
  </div>

  <div class="container mx-auto my-10 border shadow-md">
    <p-table #table [value]="sources" [globalFilterFields]="['name','description']">
      <ng-template pTemplate="caption">
        <div class="flex items-center gap-2">
          <span class="flex-grow"></span>

          <button pButton type="button" label="New Source" icon="pi pi-plus" class="p-button-sm"
            (click)="create()"></button>

          <span class="p-input-icon-right">
            <i class="pi pi-search"></i>
            <input pInputText type="text" (input)="filter(table, $event)" placeholder="Filter" class="p-inputtext-sm" />
          </span>
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th class="w-16" style="text-align: center;">Actions</th>
          <th>Name & Description</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-source>
        <tr>
          <td>
            <div class="flex flex-col items-center justify-center gap-1">
              <button pButton type="button" icon="pi pi-trash"
                class="p-button-text p-button-sm p-button-danger remove-btn" (click)="remove(source)">
              </button>
              <button pButton type="button" icon="pi pi-eye" title="Preview"
                class="p-button-text p-button-sm p-button-help preview-btn" (click)="preview(source)">
                <!-- [routerLink]="['/viewer', source.id]" -->
              </button>
            </div>
          </td>
          <td>
            <div class="flex flex-col">
              <span [routerLink]="['/editor', source.id]" class="font-bold cursor-pointer text-blue-700">
                {{source.name || '[name not specified]'}}
              </span>
              <span class="text-xs">{{source.description}}</span>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="2">
            <div class="text-xs text-center text-gray-400 w-full">
              no record matched, revise your filter keyword
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>


<p-dialog [(visible)]="showPreview" [modal]="true" class="preview-dialog" [style]="{width: '85vw', height: '85vh'}"
  (onHide)="previewLink = null">
  <iframe *ngIf="previewLink" [src]="previewLink" style="width: 100%; height: 100%"></iframe>
</p-dialog>
